id: 9f2f5d8a-6b3a-4b88-9f8d-3c9d1a4e7b11
name: Entra ID MFA Fatigue with Successful Authentication and Device Context Correlation
description: |
  Detects potential MFA fatigue (push bombing) attacks where a user receives multiple MFA prompts,
  declines several requests, and eventually completes a successful authentication within a short period.
  The rule correlates MFA denials, successful sign-ins, device anomalies, geographic anomalies,
  IP diversity, and Entra ID risk signals to identify likely account compromise attempts.

author: Tim A.
version: 1.0.0
kind: Scheduled
severity: High
status: Available
enabled: true

requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - SigninLogs

queryFrequency: 1h
queryPeriod: 14d

triggerOperator: GreaterThan
triggerThreshold: 0

suppressionEnabled: false
suppressionDuration: 5h

tactics:
  - CredentialAccess
  - InitialAccess

techniques:
  - T1110
  - T1621

incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 1d
    matchingMethod: AllEntities
    groupByEntities:
      - Account
      - IP
    groupByAlertDetails: []
    groupByCustomDetails: []

eventGroupingSettings:
  aggregationKind: SingleAlert

customDetails:
  RiskScore: RiskScore
  RiskLevel: RiskLevel
  DenialCount: DenialCount
  SuccessCount: SuccessCount
  MultipleCountries: MultipleCountries
  MultipleIPs: MultipleIPs
  NewDeviceUsed: NewDeviceUsed

entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: UserPrincipalName

  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress

query: |
  let timeframe = 20m;
  let denialThreshold = 5;
  let riskScoreThreshold = 8;
  let lookback = 14d;
  // Step 1: Build baseline of known devices.
  let KnownDevices =
      SigninLogs
      | where TimeGenerated between (ago(lookback) .. ago(1h))
      | summarize KnownDeviceSet = make_set(DeviceDetail.displayName) by UserPrincipalName;
  // Step 2: Detect MFA fatigue pattern in the most recent rule interval.
  let MFAFatigue =
      SigninLogs
      | where TimeGenerated > ago(1h)
      | where AuthenticationRequirement == "multiFactorAuthentication"
      | extend ResultTypeString = tostring(ResultType)
      | extend MFAStatus = tostring(Status.additionalDetails)
      | extend RiskLevelString = tostring(RiskLevelDuringSignIn)
      | extend RiskLevelScore =
          case(
              RiskLevelString == "high", 5,
              RiskLevelString == "medium", 3,
              RiskLevelString == "low", 1,
              0
          )
      | summarize
          DenialCount = countif(
              MFAStatus has "User declined"
              or ResultTypeString == "500121"
          ),
          SuccessCount = countif(ResultTypeString == "0"),
          IPList = make_set(IPAddress),
          LocationList = make_set(LocationDetails.countryOrRegion),
          CityList = make_set(LocationDetails.city),
          DeviceList = make_set(DeviceDetail.displayName),
          OSList = make_set(DeviceDetail.operatingSystem),
          BrowserList = make_set(DeviceDetail.browser),
          MaxRiskLevelScore = max(RiskLevelScore)
          by UserPrincipalName, bin(TimeGenerated, timeframe)
      | where DenialCount >= denialThreshold
      | where SuccessCount > 0;
  // Step 3: Correlate against baseline and calculate risk score.
  MFAFatigue
  | join kind=leftouter KnownDevices on UserPrincipalName
  | extend NewDeviceUsed =
      iff(
          array_length(
              set_difference(
                  DeviceList,
                  coalesce(KnownDeviceSet, dynamic([]))
              )
          ) > 0,
          true,
          false
      )
  | extend MultipleCountries = iff(array_length(LocationList) > 1, true, false)
  | extend MultipleIPs = iff(array_length(IPList) > 1, true, false)
  | extend RiskScore =
      DenialCount +
      (SuccessCount * 2) +
      (toint(NewDeviceUsed) * 3) +
      (toint(MultipleCountries) * 3) +
      (toint(MultipleIPs) * 2) +
      MaxRiskLevelScore
  | where RiskScore >= riskScoreThreshold
  | extend RiskLevel =
      case(
          MaxRiskLevelScore == 5, "high",
          MaxRiskLevelScore == 3, "medium",
          MaxRiskLevelScore == 1, "low",
          "none"
      )
  | project
      TimeGenerated,
      UserPrincipalName,
      DenialCount,
      SuccessCount,
      RiskLevel,
      RiskScore,
      NewDeviceUsed,
      MultipleCountries,
      MultipleIPs,
      IPAddress = tostring(IPList[0]),
      IPList,
      LocationList,
      CityList,
      DeviceList,
      OSList,
      BrowserList
