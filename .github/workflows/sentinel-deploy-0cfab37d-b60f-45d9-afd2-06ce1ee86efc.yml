name: Deploy Content to secops-analytic-workspace-prod [0cfab37d-b60f-45d9-afd2-06ce1ee86efc]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-0cfab37d-b60f-45d9-afd2-06ce1ee86efc.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-0cfab37d-b60f-45d9-afd2-06ce1ee86efc.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'prod_environment'
      workspaceName: 'secops-analytic-workspace-prod'
      workspaceId: 'b2531e7f-4819-43b6-890a-f03fe8361d82'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'AnalyticsRule,AutomationRule,HuntingQuery,Parser,Playbook,Workbook,Watchlist'
      branch: 'main'
      sourceControlId: '0cfab37d-b60f-45d9-afd2-06ce1ee86efc'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'false'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_0cfab37db60f45d9afd206ce1ee86efc }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_0cfab37db60f45d9afd206ce1ee86efc }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_0cfab37db60f45d9afd206ce1ee86efc }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_0cfab37db60f45d9afd206ce1ee86efc }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_0cfab37db60f45d9afd206ce1ee86efc }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_0cfab37db60f45d9afd206ce1ee86efc }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_0cfab37db60f45d9afd206ce1ee86efc }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_0cfab37db60f45d9afd206ce1ee86efc }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_0cfab37db60f45d9afd206ce1ee86efc }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
            Get-ChildItem -Recurse *.yaml
            & "${{ github.workspace }}\.github\workflows\azure-sentinel-deploy-0cfab37d-b60f-45d9-afd2-06ce1ee86efc.ps1"
